<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>404 - 页面未找到</title>
    <style>
        body{font-family: Arial,sans-serif;background:#f0f2f5;margin:0;padding:0;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .container{text-align:center;padding:40px}
        h1{font-size:100px;color:#d32f2f;margin:0}
        h2{color:#333;margin:20px 0}
        p{color:#666;max-width:500px;margin:0 auto 30px}
        a{display:inline-block;padding:10px 25px;background:#1976d2;color:#fff;text-decoration:none;border-radius:4px}
        a:hover{background:#1565c0}
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>页面未找到</h2>
        <p>抱歉，您访问的页面不存在。请检查网址是否正确，或返回首页继续使用我们的服务。</p>
        <a href="/">返回首页</a>
    </div>
</body>
</html>
